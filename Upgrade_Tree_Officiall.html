<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upgrade Tree</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0b0c10;
  --surface:   #13151c;
  --border:    #252836;
  --border2:   #333650;
  --text:      #dde1f0;
  --accent2:   #7eb3ff;
  --gold:      #f5c842;
  --gold-bg:   #2a1f00;
  --gold-bd:   #5a3f00;
  --green:     #3ecf6e;
  --font-ui:   'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); cursor: grab; }
body.dragging { cursor: grabbing; }
#viewport {
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 24px 24px;
}
#scene {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
}


#img-wrapper { position: relative; display: inline-block; line-height: 0; user-select: none; }
#tree-img { display: block; max-width: none; pointer-events: none; user-select: none; -webkit-user-drag: none; }
.hnode { position: absolute; transform: translate(-50%, -50%); cursor: pointer; pointer-events: all; }
.hnode svg { display: block; }
.hnode polygon { fill: transparent; stroke: none; }
#tooltip {
  position: fixed; z-index: 9999; pointer-events: none;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 11px 14px; max-width: 230px;
  display: none; box-shadow: 0 6px 28px rgba(0,0,0,0.7);
}
.tip-name { font-size: 14px; font-weight: 700; color: var(--accent2); margin-bottom: 5px; }
.tip-cost {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--gold-bg); border: 1px solid var(--gold-bd);
  color: var(--gold); font-family: var(--font-mono); font-size: 12px;
  font-weight: 600; border-radius: 5px; padding: 3px 9px; margin-bottom: 7px;
}
.tip-cost::before { content: '◈'; font-size: 10px; }
.tip-desc { font-size: 12px; color: #7a82a8; line-height: 1.6; }
</style>
</head>
<body>
<div id="viewport">
  <div id="scene">
    <div id="img-wrapper">

    </div>
  </div>

  <div class="tip-name" id="t-name"></div>

let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
const MIN_SCALE = 0.1, MAX_SCALE = 4;

function applyTransform() {
  scene.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

// Pan with left click drag — works everywhere including on hex nodes
let hasPanned = false;
document.addEventListener('mousedown', e => {
  isPanning = true;
  hasPanned = false;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panOriginX = panX;
  panOriginY = panY;
  document.body.classList.add('dragging');
});

  const dx = e.clientX - panStartX;
  const dy = e.clientY - panStartY;
  if (!hasPanned && Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
  hasPanned = true;
  panX = panOriginX + dx;
  panY = panOriginY + dy;
  applyTransform();
  // Keep tooltip following cursor while panning
  if (tooltip.style.display === 'block') {
    const x = e.clientX + 14, y = e.clientY + 14;
    tooltip.style.left = (x + 235 > window.innerWidth ? e.clientX - 245 : x) + 'px';
    tooltip.style.top  = (y + 120 > window.innerHeight ? e.clientY - 130 : y) + 'px';
  }
});
document.addEventListener('mouseup', () => {
  isPanning = false;
  setTimeout(() => { hasPanned = false; }, 50);
  document.body.classList.remove('dragging');
});

// Zoom with scroll wheel
document.getElementById('viewport').addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
  // Zoom toward mouse cursor
  const rect = document.getElementById('viewport').getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

// ── HEX POINTS ──
function hexPoints(r) {
  const scale = r / 18;
  return [
    [11.2*scale, 5.2*scale],[25.8*scale, 5.2*scale],
    [32.7*scale, 17.4*scale],[25.8*scale, 30.4*scale],
    [10.9*scale, 30.8*scale],[3.3*scale, 17.4*scale]
  ].map(p => p.join(',')).join(' ');
}

function toggleTree(targetTree) {
  activeTree = targetTree;
  if (activeTree === 'main') {
    activeNodes = mainNodes;
    treeImg.src = MAIN_IMG_SRC;
  } else if (activeTree === 'player') {
    activeNodes = playerNodes;
    treeImg.src = PLAYER_IMG_SRC;
  } else if (activeTree === 'loot') {
    activeNodes = lootNodes;
    treeImg.src = LOOT_IMG_SRC;
  }
}

// ── RENDER NODES ──
function renderNodes() {
  document.querySelectorAll('.hnode').forEach(e => e.remove());
  const iw = treeImg.offsetWidth;
  const ih = treeImg.offsetHeight;
  const r = HEX_R;
  activeNodes.forEach(n => {
    const dx = n.px / 100 * iw;
    const dy = n.py / 100 * ih;
    const el = document.createElement('div');
    el.className = 'hnode' + (n.name || n.cost ? ' has-data' : '');
    el.style.cssText = `position:absolute;left:${dx}px;top:${dy}px;width:${r*2}px;height:${r*2}px;`;
    el.innerHTML = `<svg width="${r*2}" height="${r*2}" viewBox="0 0 ${r*2} ${r*2}" style="display:block"><polygon points="${hexPoints(r)}"/></svg>`;
    el.addEventListener('mouseenter', () => {
      if (!n.name && !n.cost && !n.desc) return;
      document.getElementById('t-name').textContent = n.name || '(unnamed)';
      document.getElementById('t-cost').textContent = n.cost || '—';
      const descEl = document.getElementById('t-desc');
      descEl.textContent = n.desc || '';
      descEl.style.display = n.desc ? 'block' : 'none';
      tooltip.style.display = 'block';
    });
    el.addEventListener('mousemove', e => {
      const x = e.clientX + 14, y = e.clientY + 14;
      tooltip.style.left = (x + 235 > window.innerWidth ? e.clientX - 245 : x) + 'px';
      tooltip.style.top  = (y + 120 > window.innerHeight ? e.clientY - 130 : y) + 'px';
    });
    el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    el.addEventListener('click', () => {
      if (n.name === 'Player') {
        if (activeTree === 'player') toggleTree('main');
        else toggleTree('player');
      }
      if (n.name === 'Loot') {
        if (activeTree === 'loot') toggleTree('main');
        else toggleTree('loot');
      }
    });
    imgWrapper.appendChild(el);
  });
}


treeImg.addEventListener('dragstart', e => e.preventDefault());
treeImg.src = IMG_SRC;
treeImg.onload = () => {
  // Center the image on load
  const vw = window.innerWidth, vh = window.innerHeight;
  const iw = treeImg.naturalWidth, ih = treeImg.naturalHeight;
  const fitScale = Math.min(vw / iw, vh / ih, 1);
  scale = fitScale;
  panX = (vw - iw * fitScale) / 2;
  panY = (vh - ih * fitScale) / 2;
  applyTransform();
  renderNodes();
};
</script>
</body>
