<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upgrade Tree</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: #0b0c10;
  font-family: 'Syne', sans-serif;
  overflow: auto;
}

#drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 12px;
  color: #3a4060;
}
#drop-zone h2 { font-size: 18px; color: #4a5070; }
#drop-zone p  { font-size: 13px; max-width: 300px; text-align: center; line-height: 1.6; }
#drop-zone label {
  padding: 10px 22px;
  border: 1.5px dashed #2a3050;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: #4a5880;
  transition: all 0.15s;
}
#drop-zone label:hover { border-color: #4f8ef7; color: #7eb3ff; }

#img-wrapper {
  position: relative;
  display: none;
  line-height: 0;
  padding: 16px;
}
#tree-img { display: block; max-width: 100%; }

.hnode {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: all;
  cursor: default;
}
.hnode svg { display: block; }
.hnode polygon {
  fill: rgba(255,255,255,0);
  stroke: rgba(255,255,255,0);
  transition: fill 0.12s, stroke 0.12s;
}
.hnode.has-data { cursor: pointer; }

#tooltip {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  background: #12141e;
  border: 1px solid #2a3050;
  border-radius: 10px;
  padding: 12px 15px;
  max-width: 230px;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.75);
}
.tip-name {
  font-size: 14px;
  font-weight: 700;
  color: #7eb3ff;
  margin-bottom: 6px;
}
.tip-cost {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #1e1400;
  border: 1px solid #4a3200;
  color: #f5c842;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  border-radius: 5px;
  padding: 3px 8px;
  margin-bottom: 7px;
}
.tip-cost::before { content: '◈'; font-size: 9px; opacity: 0.8; }
.tip-desc {
  font-size: 12px;
  color: #6a7298;
  line-height: 1.6;
}

input[type=file] { display: none; }
</style>
</head>
<body>

<div id="drop-zone">
  <h2>Upgrade Tree</h2>
  <p>Load your upgrade tree image to see interactive tooltips on each node.</p>
  <label for="img-input">Load Image</label>
</div>

<div id="img-wrapper">
  <img id="tree-img" alt="Upgrade Tree">
</div>

<div id="tooltip">
  <div class="tip-name"  id="t-name"></div>
  <div class="tip-cost"  id="t-cost" style="display:none"></div>
  <div class="tip-desc"  id="t-desc" style="display:none"></div>
</div>

<input type="file" id="img-input" accept="image/*">

const IMG_KEY = 'utre_img_v1';

const wrapper  = document.getElementById('img-wrapper');
const treeImg  = document.getElementById('tree-img');
const dropZone = document.getElementById('drop-zone');
const tooltip  = document.getElementById('tooltip');

function applyImage(src) {
  treeImg.src = src;
  treeImg.onload = () => {
    dropZone.style.display = 'none';
    wrapper.style.display = 'block';
    renderNodes();
  };
}

document.getElementById('img-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { try { localStorage.setItem(IMG_KEY, ev.target.result); } catch(err) {} applyImage(ev.target.result); };
  r.readAsDataURL(f);
  e.target.value = '';
});

document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (!f || !f.type.startsWith('image/')) return;
  const r = new FileReader();
  r.onload = ev => { try { localStorage.setItem(IMG_KEY, ev.target.result); } catch(err) {} applyImage(ev.target.result); };
  r.readAsDataURL(f);
});

function hexPoints(r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    pts.push(`${r + r * Math.cos(a)},${r + r * Math.sin(a)}`);
  }
  return pts.join(' ');
}

function renderNodes() {
  document.querySelectorAll('.hnode').forEach(e => e.remove());

  const iw = treeImg.offsetWidth;
  const ih = treeImg.offsetHeight;

  // Scale hex radius to match image hexagons
  const scale = iw / 1260;
  const r = Math.max(8, Math.round(42 * scale));

  // Offset to correct alignment (nudge right and down)
  const offX = iw * 0.012;
  const offY = ih * 0.018;

  NODES.forEach((n) => {
    const dx = (n.px / 100 * iw) + offX;
    const dy = (n.py / 100 * ih) + offY;

    const el = document.createElement('div');
    el.className = 'hnode' + (n.name ? ' has-data' : '');
    el.style.cssText = `position:absolute;left:${dx}px;top:${dy}px;width:${r*2}px;height:${r*2}px;`;

    el.innerHTML = `<svg width="${r*2}" height="${r*2}" viewBox="0 0 ${r*2} ${r*2}">
      <polygon points="${hexPoints(r)}" stroke-width="1.5"/>
    </svg>`;

    if (n.name) {
      el.addEventListener('mouseenter', () => {
        document.getElementById('t-name').textContent = n.name;
        const costEl = document.getElementById('t-cost');
        const descEl = document.getElementById('t-desc');
        if (n.cost) { costEl.textContent = n.cost; costEl.style.display = 'inline-flex'; }
        else costEl.style.display = 'none';
        if (n.desc) { descEl.textContent = n.desc; descEl.style.display = 'block'; }
        else descEl.style.display = 'none';
        tooltip.style.display = 'block';
      });
      el.addEventListener('mousemove', e => {
        const x = e.clientX + 14, y = e.clientY + 14;
        tooltip.style.left = (x + 240 > window.innerWidth  ? e.clientX - 248 : x) + 'px';
        tooltip.style.top  = (y + 130 > window.innerHeight ? e.clientY - 138 : y) + 'px';
      });
      el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    }

    wrapper.appendChild(el);
  });
}

window.addEventListener('resize', () => { if (treeImg.src && treeImg.complete) renderNodes(); });

// restore cached image
try {
  const cached = localStorage.getItem(IMG_KEY);
  if (cached) applyImage(cached);
} catch(e) {}
</script>

</html>
