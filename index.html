<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime RNG — Upgrade Tree</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060f1a;font-family:sans-serif;padding:16px;min-height:100vh}
.tree-wrap{background:#0d1b2a;border-radius:12px;padding:16px;position:relative;overflow:hidden}
.tree-scroll{overflow-x:auto;overflow-y:hidden}
.tree-canvas{position:relative;width:720px;height:520px;margin:0 auto}
.hex-wrap{position:absolute;cursor:pointer}
.hex{width:80px;height:88px;position:relative;transition:filter .15s}
.hex:hover{filter:brightness(1.3)}
.hex:hover polygon.bg{stroke:#ffffff;stroke-width:2.5}
.hex text{pointer-events:none;user-select:none}
.hex.locked polygon.bg{fill:#1a2a3a;stroke:#0a1520;stroke-width:2}
.hex.locked polygon.shine{fill:#223344;opacity:0.3}
.hex.unlocked polygon.bg{fill:#1a4a7a;stroke:#0a1520;stroke-width:2}
.hex.unlocked polygon.shine{fill:#2a5f9a;opacity:0.3}
.hex.special polygon.bg{fill:#5a3a00;stroke:#0a1520;stroke-width:2}
.hex.special polygon.shine{fill:#7a5010;opacity:0.3}
.hex.open polygon.bg{fill:#2a5a00;stroke:#0a1520;stroke-width:2}
.hex.open polygon.shine{fill:#3f8000;opacity:0.3}
.tooltip{
  position:absolute;
  background:#071018;
  border:1px solid #1e4060;
  border-radius:10px;
  padding:12px 14px;
  width:190px;
  z-index:200;
  pointer-events:none;
  opacity:0;
  transition:opacity .12s;
}
.tooltip.show{opacity:1}
.tt-name{font-size:14px;font-weight:700;color:#e8f4ff;margin-bottom:3px}
.tt-cat{font-size:10px;color:#4a8fc4;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em}
.tt-desc{font-size:12px;color:#7aaabb;line-height:1.55;margin-bottom:8px}
.tt-cost{font-size:12px;color:#f0c040;font-weight:600}
.tt-locked{font-size:11px;color:#e24b4a;margin-top:3px}
.legend{display:flex;gap:18px;margin-bottom:14px;flex-wrap:wrap;padding:0 2px}
.leg{display:flex;align-items:center;gap:7px;font-size:12px;color:#7aaabb}
.leg-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.hint{font-size:11px;color:#304a5a;margin-top:10px;padding:0 2px}
</style>
</head>
<body>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#2a5a00;border:1px solid #3f8000"></div>Open</div>
  <div class="leg"><div class="leg-dot" style="background:#1a4a7a;border:1px solid #2a5f9a"></div>Unlocked</div>
  <div class="leg"><div class="leg-dot" style="background:#1a2a3a;border:1px solid #223344"></div>Locked</div>
  <div class="leg"><div class="leg-dot" style="background:#5a3a00;border:1px solid #7a5010"></div>Special</div>
</div>

<div class="tree-wrap">
  <div class="tree-scroll">
    <div class="tree-canvas" id="treeCanvas">
      <svg id="connsvg" style="position:absolute;top:0;left:0;width:720px;height:520px;pointer-events:none"></svg>
    </div>
  </div>
  <div class="tooltip" id="tooltip">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-cat" id="tt-cat"></div>
    <div class="tt-desc" id="tt-desc"></div>
    <div class="tt-cost" id="tt-cost"></div>
    <div class="tt-locked" id="tt-locked"></div>
  </div>
</div>
<p class="hint">Hover any node to see details &nbsp;·&nbsp; Dashed lines show upgrade paths</p>

<script>
var HW=80,HH=88;

function hexPoints(cx,cy,r){
  var pts=[];
  for(var i=0;i<6;i++){
    var a=(Math.PI/180)*(60*i-30);
    pts.push((cx+r*Math.cos(a)).toFixed(2)+','+(cy+r*Math.sin(a)).toFixed(2));
  }
  return pts.join(' ');
}

// =============================================
// UPGRADE DATA — add/edit your upgrades here
// type: 'open' | 'unlocked' | 'locked' | 'special'
// x, y: pixel position on the canvas
// =============================================
var upgrades=[
  {id:'loot',       label:'Loot',         cat:'Chest',   desc:'Opens a loot chest. Grants random items from the loot pool.',              cost:'Free',        type:'open',     x:290, y:20},
  {id:'autoroll',   label:'Auto Roll',    cat:'Utility', desc:'Automatically rolls the dice every cycle. Essential for idle play.',        cost:'500 coins',   type:'unlocked', x:200, y:100},
  {id:'backpack',   label:'Backpack',     cat:'Storage', desc:'Increases your item carry limit by 5.',                                     cost:'1.2K coins',  type:'unlocked', x:290, y:100},
  {id:'rollspeed',  label:'Roll Speed',   cat:'Dice',    desc:'Reduces the cooldown between rolls by 10%.',                                cost:'2K coins',    type:'unlocked', x:380, y:100},
  {id:'goldenrolls',label:'Golden Rolls', cat:'Dice',    desc:'Each roll has a chance to become a golden roll, worth 3x.',                 cost:'8K coins',    type:'unlocked', x:200, y:185},
  {id:'player',     label:'Player',       cat:'Special', desc:'Opens the player upgrade menu. Unlock character perks.',                    cost:'Free',        type:'special',  x:290, y:185},
  {id:'bonuschance',label:'Bonus Chance', cat:'Dice',    desc:'Increases the chance of triggering bonus events on a roll.',                cost:'5K coins',    type:'unlocked', x:380, y:185},
  {id:'luck1',      label:'Luck I',       cat:'Luck',    desc:'Passively increases your luck stat by 5. Affects rare drop rates.',         cost:'3K coins',    type:'unlocked', x:110, y:185},
  {id:'fasterrolls',label:'Faster Rolls', cat:'Dice',    desc:'A stronger Roll Speed upgrade. Reduces roll cooldown by 25%.',              cost:'15K coins',   type:'locked',   x:380, y:270},
  {id:'extrarolls', label:'Extra Golden', cat:'Dice',    desc:'Adds a second golden roll chance per cycle.',                               cost:'20K coins',   type:'locked',   x:200, y:270},
  {id:'luck2',      label:'Luck II',      cat:'Luck',    desc:'Increases your luck stat to 12 total.',                                     cost:'10K coins',   type:'unlocked', x:110, y:270},
  {id:'rapidrolls', label:'Rapid Rolls',  cat:'Dice',    desc:'Near-instant roll speed. Requires Faster Rolls to unlock.',                 cost:'50K coins',   type:'locked',   x:470, y:270},
  {id:'bonuschains',label:'Bonus Chains', cat:'Dice',    desc:'Bonus events can chain together, triggering up to 3x in a row.',            cost:'30K coins',   type:'locked',   x:380, y:355},
  {id:'luck3',      label:'Luck III',     cat:'Luck',    desc:'Increases your luck stat to 25 total. Rare and powerful.',                  cost:'40K coins',   type:'locked',   x:110, y:355},
  {id:'voidrolls',  label:'Void Rolls',   cat:'Void',    desc:'Adds void dice to your pool. Void rolls can phase through obstacles.',      cost:'80K coins',   type:'locked',   x:20,  y:355},
  {id:'bonusfrenzy',label:'Bonus Frenzy', cat:'Dice',    desc:'Requires 10K+ rolls. All rolls become bonus rolls for 10 seconds.',         cost:'10.0K rolls', type:'locked',   x:380, y:440},
  {id:'diamondrolls',label:'Diamond',     cat:'Void',    desc:'Diamond dice have a chance to multiply your winnings by 10.',               cost:'120K coins',  type:'locked',   x:110, y:440},
  {id:'slimes3',    label:'3 Slime Slots',cat:'Slime',   desc:'Unlocks 3 slime encounter slots per run.',                                  cost:'1K coins',    type:'unlocked', x:560, y:100},
  {id:'slimes4',    label:'4 Slime Slots',cat:'Slime',   desc:'Unlocks a 4th slime slot per run.',                                         cost:'3K coins',    type:'locked',   x:560, y:185},
  {id:'slimes5',    label:'5 Slime Slots',cat:'Slime',   desc:'Unlocks a 5th slime slot. More slimes means more drops.',                   cost:'8K coins',    type:'locked',   x:560, y:270},
  {id:'enemies2',   label:'2 Enemies',    cat:'Combat',  desc:'Spawns 2 enemies per encounter for more challenge and rewards.',             cost:'500 coins',   type:'unlocked', x:650, y:100},
  {id:'enemies3',   label:'3 Enemies',    cat:'Combat',  desc:'Spawns 3 enemies per encounter.',                                           cost:'2K coins',    type:'locked',   x:650, y:185},
  {id:'bosses',     label:'Bosses',        cat:'Combat',  desc:'Enables boss encounters. Bosses are tough but drop rare loot.',             cost:'25K coins',   type:'locked',   x:650, y:270},
];

// =============================================
// CONNECTION DATA — [parentId, childId] pairs
// =============================================
var connections=[
  ['loot','autoroll'],['loot','backpack'],['loot','rollspeed'],['loot','slimes3'],['loot','enemies2'],
  ['autoroll','goldenrolls'],['backpack','player'],['rollspeed','bonuschance'],
  ['autoroll','luck1'],['luck1','luck2'],['luck2','luck3'],
  ['luck2','voidrolls'],['luck3','diamondrolls'],
  ['rollspeed','fasterrolls'],['fasterrolls','rapidrolls'],
  ['goldenrolls','extrarolls'],
  ['bonuschance','bonuschains'],['bonuschains','bonusfrenzy'],
  ['slimes3','slimes4'],['slimes4','slimes5'],
  ['enemies2','enemies3'],['enemies3','bosses'],
];

var canvas=document.getElementById('treeCanvas');
var tooltip=document.getElementById('tooltip');
var svgEl=document.getElementById('connsvg');
var svgNS='http://www.w3.org/2000/svg';

var posMap={};
upgrades.forEach(function(u){posMap[u.id]={x:u.x,y:u.y}});

connections.forEach(function(pair){
  var pa=posMap[pair[0]],pb=posMap[pair[1]];
  if(!pa||!pb)return;
  var line=document.createElementNS(svgNS,'line');
  line.setAttribute('x1',pa.x+HW/2); line.setAttribute('y1',pa.y+HH/2);
  line.setAttribute('x2',pb.x+HW/2); line.setAttribute('y2',pb.y+HH/2);
  line.setAttribute('stroke','#1a3a52');
  line.setAttribute('stroke-width','2');
  line.setAttribute('stroke-dasharray','5 4');
  svgEl.appendChild(line);
});

upgrades.forEach(function(u){
  var wrap=document.createElement('div');
  wrap.className='hex-wrap';
  wrap.style.left=u.x+'px';
  wrap.style.top=u.y+'px';
  wrap.style.width=HW+'px';
  wrap.style.height=HH+'px';

  var cx=HW/2, cy=HH/2, r=36;
  var svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('width',HW); svg.setAttribute('height',HH);
  svg.setAttribute('viewBox','0 0 '+HW+' '+HH);
  svg.classList.add('hex'); svg.classList.add(u.type);

  var bg=document.createElementNS(svgNS,'polygon');
  bg.setAttribute('points',hexPoints(cx,cy,r));
  bg.classList.add('bg');

  var shine=document.createElementNS(svgNS,'polygon');
  shine.setAttribute('points',hexPoints(cx,cy,r-5));
  shine.classList.add('shine');

  svg.appendChild(bg); svg.appendChild(shine);

  var words=u.label.split(' ');
  words.forEach(function(word,i){
    var t=document.createElementNS(svgNS,'text');
    t.setAttribute('x',cx);
    t.setAttribute('y', words.length===1 ? cy+4 : cy+(i-words.length/2+0.7)*13);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','9');
    t.setAttribute('font-weight','700');
    t.setAttribute('fill', u.type==='locked' ? '#3a6a8a' : '#d8f0ff');
    t.setAttribute('font-family','sans-serif');
    t.textContent=word;
    svg.appendChild(t);
  });

  wrap.appendChild(svg);
  canvas.appendChild(wrap);

  wrap.addEventListener('mouseenter',function(){
    document.getElementById('tt-name').textContent=u.label;
    document.getElementById('tt-cat').textContent=u.cat;
    document.getElementById('tt-desc').textContent=u.desc;
    document.getElementById('tt-cost').textContent='Cost: '+u.cost;
    document.getElementById('tt-locked').textContent=u.type==='locked'?'Locked — upgrade to unlock':'';
    var tx=u.x+HW+8, ty=u.y;
    if(tx+190>720) tx=u.x-198;
    if(ty+160>520) ty=520-160;
    if(ty<0) ty=0;
    tooltip.style.left=tx+'px';
    tooltip.style.top=ty+'px';
    tooltip.classList.add('show');
  });
  wrap.addEventListener('mouseleave',function(){
    tooltip.classList.remove('show');
  });
});
</script>
</body>
</html>
