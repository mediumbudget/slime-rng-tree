<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime RNG — Upgrade Tree</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060f1a;font-family:sans-serif;padding:16px;min-height:100vh}
.tree-wrap{background:#0d1b2a;border-radius:12px;padding:16px;position:relative}
.tree-scroll{overflow-x:auto;overflow-y:hidden}
.tree-canvas{position:relative;width:780px;height:560px;margin:0 auto}
.hex-wrap{position:absolute;cursor:pointer}
.hex-wrap:hover svg polygon.outer{stroke:#ffffff}
.hex-wrap:hover svg{filter:brightness(1.25)}
svg{transition:filter .15s}
.tooltip{
  position:absolute;
  background:#071018;
  border:1px solid #1e4060;
  border-radius:10px;
  padding:12px 14px;
  width:190px;
  z-index:200;
  pointer-events:none;
  opacity:0;
  transition:opacity .12s;
}
.tooltip.show{opacity:1}
.tt-name{font-size:14px;font-weight:700;color:#e8f4ff;margin-bottom:3px}
.tt-cat{font-size:10px;color:#4a8fc4;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em}
.tt-desc{font-size:12px;color:#7aaabb;line-height:1.55;margin-bottom:8px}
.tt-cost{font-size:12px;color:#f0c040;font-weight:600}
.tt-locked{font-size:11px;color:#e24b4a;margin-top:3px}
.legend{display:flex;gap:18px;margin-bottom:14px;flex-wrap:wrap;padding:0 2px}
.leg{display:flex;align-items:center;gap:7px;font-size:12px;color:#7aaabb}
.leg-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.hint{font-size:11px;color:#304a5a;margin-top:10px;padding:0 2px}
</style>
</head>
<body>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#2a6a1a;border:1px solid #3f9a28"></div>Open</div>
  <div class="leg"><div class="leg-dot" style="background:#1a4a7a;border:1px solid #2a5f9a"></div>Unlocked</div>
  <div class="leg"><div class="leg-dot" style="background:#1a2a3a;border:1px solid #2a3a4a"></div>Locked</div>
  <div class="leg"><div class="leg-dot" style="background:#5a3a00;border:1px solid #7a5010"></div>Special</div>
</div>

<div class="tree-wrap">
  <div class="tree-scroll">
    <div class="tree-canvas" id="treeCanvas">
      <svg id="connsvg" style="position:absolute;top:0;left:0;width:780px;height:560px;pointer-events:none"></svg>
    </div>
  </div>
  <div class="tooltip" id="tooltip">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-cat" id="tt-cat"></div>
    <div class="tt-desc" id="tt-desc"></div>
    <div class="tt-cost" id="tt-cost"></div>
    <div class="tt-locked" id="tt-locked"></div>
  </div>
</div>
<p class="hint">Hover any node to see details &nbsp;·&nbsp; Dashed lines show upgrade paths</p>

<script>
var W=90,H=90;
var CX=W/2,CY=H/2,R=42,Ri=36;

function flatHexPts(cx,cy,r){
  var pts=[];
  for(var i=0;i<6;i++){
    var a=(Math.PI/180)*(60*i);
    pts.push((cx+r*Math.cos(a)).toFixed(2)+','+(cy+r*Math.sin(a)).toFixed(2));
  }
  return pts.join(' ');
}

var COLORS={
  open:   {outer:'#0a0a0a',mid:'#2a8a1a',inner:'#38aa22'},
  unlocked:{outer:'#0a0a0a',mid:'#1a6abf',inner:'#2278d4'},
  locked: {outer:'#0a0a0a',mid:'#1a2a3a',inner:'#223344'},
  special:{outer:'#0a0a0a',mid:'#7a4a00',inner:'#9a6010'},
};

var upgrades=[
  {id:'loot',       label:'Loot',         cat:'Chest',   desc:'Opens a loot chest. Grants random items from the loot pool.',           cost:'Free',        type:'open',     x:300, y:20},
  {id:'autoroll',   label:'Auto Roll',    cat:'Utility', desc:'Automatically rolls the dice every cycle. Essential for idle play.',     cost:'500 coins',   type:'unlocked', x:205, y:105},
  {id:'backpack',   label:'Backpack',     cat:'Storage', desc:'Increases your item carry limit by 5.',                                  cost:'1.2K coins',  type:'unlocked', x:300, y:105},
  {id:'rollspeed',  label:'Roll Speed',   cat:'Dice',    desc:'Reduces the cooldown between rolls by 10%.',                             cost:'2K coins',    type:'unlocked', x:395, y:105},
  {id:'luck1',      label:'Luck I',       cat:'Luck',    desc:'Passively increases your luck stat by 5. Affects rare drop rates.',      cost:'3K coins',    type:'unlocked', x:110, y:105},
  {id:'slimes3',    label:'3 Slime Slots',cat:'Slime',   desc:'Unlocks 3 slime encounter slots per run.',                              cost:'1K coins',    type:'unlocked', x:570, y:105},
  {id:'enemies2',   label:'2 Enemies',    cat:'Combat',  desc:'Spawns 2 enemies per encounter for more challenge and rewards.',         cost:'500 coins',   type:'unlocked', x:665, y:105},
  {id:'goldenrolls',label:'Golden Rolls', cat:'Dice',    desc:'Each roll has a chance to become a golden roll, worth 3x.',              cost:'8K coins',    type:'unlocked', x:205, y:190},
  {id:'player',     label:'Player',       cat:'Special', desc:'Opens the player upgrade menu. Unlock character perks.',                 cost:'Free',        type:'special',  x:300, y:190},
  {id:'bonuschance',label:'Bonus Chance', cat:'Dice',    desc:'Increases the chance of triggering bonus events on a roll.',             cost:'5K coins',    type:'unlocked', x:395, y:190},
  {id:'luck2',      label:'Luck II',      cat:'Luck',    desc:'Increases your luck stat to 12 total.',                                  cost:'10K coins',   type:'unlocked', x:110, y:190},
  {id:'slimes4',    label:'4 Slime Slots',cat:'Slime',   desc:'Unlocks a 4th slime slot per run.',                                      cost:'3K coins',    type:'locked',   x:570, y:190},
  {id:'enemies3',   label:'3 Enemies',    cat:'Combat',  desc:'Spawns 3 enemies per encounter.',                                        cost:'2K coins',    type:'locked',   x:665, y:190},
  {id:'extrarolls', label:'Extra Golden', cat:'Dice',    desc:'Adds a second golden roll chance per cycle.',                            cost:'20K coins',   type:'locked',   x:205, y:275},
  {id:'fasterrolls',label:'Faster Rolls', cat:'Dice',    desc:'A stronger Roll Speed upgrade. Reduces roll cooldown by 25%.',           cost:'15K coins',   type:'locked',   x:395, y:275},
  {id:'luck3',      label:'Luck III',     cat:'Luck',    desc:'Increases your luck stat to 25 total. Rare and powerful.',               cost:'40K coins',   type:'locked',   x:110, y:275},
  {id:'voidrolls',  label:'Void Rolls',   cat:'Void',    desc:'Adds void dice to your pool. Void rolls can phase through obstacles.',   cost:'80K coins',   type:'locked',   x:15,  y:275},
  {id:'slimes5',    label:'5 Slime Slots',cat:'Slime',   desc:'Unlocks a 5th slime slot. More slimes means more drops.',               cost:'8K coins',    type:'locked',   x:570, y:275},
  {id:'bosses',     label:'Bosses',       cat:'Combat',  desc:'Enables boss encounters. Bosses are tough but drop rare loot.',          cost:'25K coins',   type:'locked',   x:665, y:275},
  {id:'rapidrolls', label:'Rapid Rolls',  cat:'Dice',    desc:'Near-instant roll speed. Requires Faster Rolls to unlock.',              cost:'50K coins',   type:'locked',   x:490, y:275},
  {id:'bonuschains',label:'Bonus Chains', cat:'Dice',    desc:'Bonus events can chain together, triggering up to 3x in a row.',         cost:'30K coins',   type:'locked',   x:395, y:360},
  {id:'diamondrolls',label:'Diamond',     cat:'Void',    desc:'Diamond dice have a chance to multiply your winnings by 10.',            cost:'120K coins',  type:'locked',   x:110, y:360},
  {id:'bonusfrenzy',label:'Bonus Frenzy', cat:'Dice',    desc:'Requires 10K+ rolls. All rolls become bonus rolls for 10 seconds.',      cost:'10.0K rolls', type:'locked',   x:395, y:445},
];

var connections=[
  ['loot','autoroll'],['loot','backpack'],['loot','rollspeed'],['loot','luck1'],['loot','slimes3'],['loot','enemies2'],
  ['autoroll','goldenrolls'],['backpack','player'],['rollspeed','bonuschance'],
  ['luck1','luck2'],['luck2','luck3'],['luck2','voidrolls'],['luck3','diamondrolls'],
  ['rollspeed','fasterrolls'],['fasterrolls','rapidrolls'],
  ['goldenrolls','extrarolls'],
  ['bonuschance','bonuschains'],['bonuschains','bonusfrenzy'],
  ['slimes3','slimes4'],['slimes4','slimes5'],
  ['enemies2','enemies3'],['enemies3','bosses'],
];

var canvas=document.getElementById('treeCanvas');
var tooltip=document.getElementById('tooltip');
var svgEl=document.getElementById('connsvg');
var svgNS='http://www.w3.org/2000/svg';
var posMap={};
upgrades.forEach(function(u){posMap[u.id]={x:u.x,y:u.y}});

connections.forEach(function(pair){
  var pa=posMap[pair[0]],pb=posMap[pair[1]];
  if(!pa||!pb)return;
  var line=document.createElementNS(svgNS,'line');
  line.setAttribute('x1',pa.x+CX); line.setAttribute('y1',pa.y+CY);
  line.setAttribute('x2',pb.x+CX); line.setAttribute('y2',pb.y+CY);
  line.setAttribute('stroke','#1a3a52');
  line.setAttribute('stroke-width','2');
  line.setAttribute('stroke-dasharray','5 4');
  svgEl.appendChild(line);
});

upgrades.forEach(function(u){
  var wrap=document.createElement('div');
  wrap.className='hex-wrap';
  wrap.style.left=u.x+'px';
  wrap.style.top=u.y+'px';
  wrap.style.width=W+'px';
  wrap.style.height=H+'px';

  var c=COLORS[u.type];
  var svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  svg.setAttribute('viewBox','0 0 '+W+' '+H);

  var outer=document.createElementNS(svgNS,'polygon');
  outer.setAttribute('points',flatHexPts(CX,CY,R));
  outer.setAttribute('fill',c.outer);
  outer.setAttribute('stroke',c.outer);
  outer.setAttribute('stroke-width','3');
  outer.classList.add('outer');

  var mid=document.createElementNS(svgNS,'polygon');
  mid.setAttribute('points',flatHexPts(CX,CY,R-2));
  mid.setAttribute('fill',c.mid);
  mid.setAttribute('stroke','none');

  var inner=document.createElementNS(svgNS,'polygon');
  inner.setAttribute('points',flatHexPts(CX,CY,Ri));
  inner.setAttribute('fill',c.inner);
  inner.setAttribute('stroke','none');

  var shine=document.createElementNS(svgNS,'polygon');
  shine.setAttribute('points',flatHexPts(CX,CY,Ri));
  shine.setAttribute('fill','#ffffff');
  shine.setAttribute('opacity','0.07');
  shine.setAttribute('stroke','none');

  svg.appendChild(outer);
  svg.appendChild(mid);
  svg.appendChild(inner);
  svg.appendChild(shine);

  var words=u.label.split(' ');
  words.forEach(function(word,i){
    var t=document.createElementNS(svgNS,'text');
    t.setAttribute('x',CX);
    t.setAttribute('y', words.length===1 ? CY+5 : CY+(i-words.length/2+0.75)*13);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','9');
    t.setAttribute('font-weight','800');
    t.setAttribute('fill', u.type==='locked' ? '#4a7a9a' : '#e8f6ff');
    t.setAttribute('stroke', u.type==='locked' ? 'none' : '#000');
    t.setAttribute('stroke-width','2');
    t.setAttribute('paint-order','stroke fill');
    t.setAttribute('font-family','Arial Black,Arial,sans-serif');
    t.textContent=word;
    svg.appendChild(t);
  });

  wrap.appendChild(svg);
  canvas.appendChild(wrap);

  wrap.addEventListener('mouseenter',function(){
    document.getElementById('tt-name').textContent=u.label;
    document.getElementById('tt-cat').textContent=u.cat;
    document.getElementById('tt-desc').textContent=u.desc;
    document.getElementById('tt-cost').textContent='Cost: '+u.cost;
    document.getElementById('tt-locked').textContent=u.type==='locked'?'Locked':'';
    var tx=u.x+W+8, ty=u.y;
    if(tx+190>780) tx=u.x-198;
    if(ty+160>560) ty=560-160;
    if(ty<0) ty=0;
    tooltip.style.left=tx+'px';
    tooltip.style.top=ty+'px';
    tooltip.classList.add('show');
  });
  wrap.addEventListener('mouseleave',function(){
    tooltip.classList.remove('show');
  });
});
</script>
</body>
</html>
